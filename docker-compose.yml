services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./db/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ./scripts/start.sh
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./server:/app
      - /app/__pycache__

  web:
    build: ./frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    command: bun run dev --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
